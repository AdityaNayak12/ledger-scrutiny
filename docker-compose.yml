version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ledger_scrutiny_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledger_scrutiny
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ledger_scrutiny_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ledger_scrutiny
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ledger_scrutiny_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules

volumes:
  postgres_data:
